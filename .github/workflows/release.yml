name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build MSI/EXE and publish GitHub Release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install -g wix --version 7.0.0
          wix extension add -g WixToolset.UI.wixext
          wix --version

      - name: Install Inno Setup
        shell: pwsh
        run: |
          winget install --id JRSoftware.InnoSetup -e --accept-source-agreements --accept-package-agreements
          $iscc = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after Inno Setup install" }
          Write-Host "ISCC=$iscc"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Version $version from tag $tag"

      - name: Build installers
        shell: pwsh
        run: |
          ./scripts/publish-release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Lucky-*-win-x64.msi
            dist/Lucky-*-win-x64-Setup.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'preview') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          body: |
            ## Lucky ${{ github.ref_name }}

            Local-first WinUI 3 AI agent harness for Windows.

            ### Install (Windows x64)

            Download **one** of:

            | Installer | Use when |
            | --- | --- |
            | `Lucky-*-win-x64-Setup.exe` | Recommended — guided setup wizard |
            | `Lucky-*-win-x64.msi` | Enterprise / silent deploy (`msiexec`) |

            Both install the self-contained app (Windows App SDK bundled) under Program Files and add Start Menu shortcuts.

            Silent MSI example:

            ```powershell
            msiexec /i Lucky-${{ steps.version.outputs.version }}-win-x64.msi /qn
            ```

            ### What's included

            - Project-scoped chat with visible tool traces
            - Providers: DeepSeek, **OpenRouter**, LM Studio, custom OpenAI-compatible, ChatGPT subscription helper
            - Durable local memory, subagents, access levels
            - Optional SearXNG, MCP (stdio), Docker sandbox

            Full notes: see README and the generated changelog.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
