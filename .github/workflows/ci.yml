name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Lucky.App defaults RuntimeIdentifier to win-<arch>. Restore must request that RID
      # or build fails with NETSDK1112 (runtime pack not downloaded). Do not pass -r to
      # solution build/test (NETSDK1134); the app csproj already supplies the RID.
      - name: Restore
        run: dotnet restore Lucky.slnx -r win-x64

      - name: Build
        run: dotnet build Lucky.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Lucky.slnx -c Release --no-build --nologo --verbosity normal

  publish-win-x64:
    name: Publish win-x64 (smoke)
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained
        run: >
          dotnet publish src/Lucky.App/Lucky.App.csproj
          -c Release
          -p:Platform=x64
          -p:RuntimeIdentifier=win-x64
          -p:WindowsPackageType=None
          -p:SelfContained=true
          -p:WindowsAppSDKSelfContained=true
          -p:PublishReadyToRun=true
          -p:PublishDir=${{ github.workspace }}/artifacts/publish/win-x64/
          --nologo

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/win-x64/Lucky.exe"
          if (-not (Test-Path $exe)) {
            throw "Published Lucky.exe not found"
          }
          Write-Host "Found Lucky.exe"