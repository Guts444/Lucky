name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Lucky.slnx

      - name: Build
        run: dotnet build Lucky.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Lucky.slnx -c Release --no-build --nologo --verbosity normal

  publish-win-x64:
    name: Publish win-x64 (smoke)
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained
        run: >
          dotnet publish src/Lucky.App/Lucky.App.csproj
          -c Release
          -p:Platform=x64
          -p:RuntimeIdentifier=win-x64
          -p:WindowsPackageType=None
          -p:SelfContained=true
          -p:WindowsAppSDKSelfContained=true
          -p:PublishDir=${{ github.workspace }}/artifacts/publish/win-x64/
          --nologo

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/win-x64/Lucky.exe"
          if (-not (Test-Path $exe)) {
            $legacy = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/win-x64/Lucky.App.exe"
            if (Test-Path $legacy) {
              Write-Host "Found Lucky.App.exe (will be renamed in release script)"
            } else {
              throw "Published executable not found"
            }
          } else {
            Write-Host "Found Lucky.exe"
          }
